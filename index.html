<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Платформер</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1c2c;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #f4f4f4;
  }
  h1 { margin: 16px 0 8px; font-size: 22px; letter-spacing: 2px; }
  .game-wrap { position: relative; max-width: 100%; }
  canvas {
    display: block;
    background: linear-gradient(#4a91db, #8fc4ec);
    border: 4px solid #333c57;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    max-width: 100%;
    height: auto;
    touch-action: none;
  }
  .hint { margin-top: 10px; font-size: 14px; color: #94a1c3; }

  /* Сенсорные кнопки — видны только на устройствах с тач-экраном */
  .controls { display: none; }
  body.touch .controls {
    display: flex;
    position: absolute;
    left: 0; right: 0; bottom: 12px;
    justify-content: space-between;
    padding: 0 14px;
    pointer-events: none;
  }
  body.touch .hint { display: none; }
  .controls .group { display: flex; gap: 14px; }
  .controls button {
    pointer-events: auto;
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.35);
    color: #fff;
    font-size: 26px;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  .controls button:active { background: rgba(255,255,255,0.35); }
  #btnJump { width: 76px; height: 76px; font-size: 30px; }
</style>
</head>
<body>
<h1>🍄 ПЛАТФОРМЕР</h1>
<div class="game-wrap">
  <canvas id="game" width="900" height="500"></canvas>
  <div class="controls">
    <div class="group">
      <button id="btnLeft" aria-label="Влево">◀</button>
      <button id="btnRight" aria-label="Вправо">▶</button>
    </div>
    <div class="group">
      <button id="btnJump" aria-label="Прыжок">⬆</button>
    </div>
  </div>
</div>
<p class="hint">← → или A/D — движение &nbsp;|&nbsp; Пробел / ↑ / W — прыжок &nbsp;|&nbsp; R — заново</p>

<script>
"use strict";

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;

const TILE = 40;
const GRAVITY = 0.55;
const MOVE_SPEED = 4.2;
const JUMP_POWER = 12.5;

// Карты уровней: # — земля, = — платформа, o — монета, ! — враг, F — флаг (финиш), P — старт игрока
const LEVELS = [
  // Уровень 1 — знакомство
  [
    "                                                            ",
    "                                                            ",
    "          o                                        o        ",
    "         ===        o o o                         ===       ",
    "                    =====          o o                      ",
    "   P           o              ==  =====   o   o          F  ",
    "  ===         ===                        === ===        === ",
    "                        o                                   ",
    "        !     ====     ===     !                 !          ",
    "#####################   ############   #####################",
    "#####################   ############   #####################",
  ],
  // Уровень 2 — прыжки через пропасти; монеты над ямами на вершине дуги (закат)
  [
    "                                                            ",
    "                                                            ",
    "                                                            ",
    "                                                            ",
    "                                                            ",
    "      o     o             o      o      o                   ",
    "     ===                        ===                         ",
    "          o    o       o     o        o        o       o    ",
    "  P                !                              !     F   ",
    "###########   ###########   ###########   ##################",
    "###########   ###########   ###########   ##################",
  ],
  // Уровень 3 — плотный ночной забег; платформы в центре сегментов (ночь)
  [
    "                                                            ",
    "                                                            ",
    "                                                            ",
    "                                                            ",
    "                                                            ",
    "           o      o     o            o      o     o         ",
    "                 ===                       ===              ",
    "        o     o                   o     o      o    o       ",
    " P   !               !        !                         F   ",
    "##########   ##########   ##########   ##########   ########",
    "##########   ##########   ##########   ##########   ########",
  ],
];

// Оформление уровней (небо, солнце/луна, звёзды)
const THEMES = [
  { sky: ["#4a91db", "#8fc4ec"], orb: "#ffe58a", glow: "255,240,160", stars: false }, // день
  { sky: ["#ff9e6d", "#ffd6a0"], orb: "#fff2c9", glow: "255,225,150", stars: false }, // закат
  { sky: ["#1e2140", "#3a3f6b"], orb: "#dfe6ff", glow: "200,210,255", stars: true },  // ночь
];

let currentLevel = 0;
let runElapsed = 0; // суммарное время пройденных уровней
let runCoins = 0;   // монеты, собранные на пройденных уровнях
// всего монет во всех уровнях
const TOTAL_COINS = LEVELS.reduce((n, lvl) => n + lvl.join("").split("o").length - 1, 0);
let LEVEL, ROWS, COLS, WORLD_W, WORLD_H;

// ---- Состояние игры ----
let solids, coins, enemies, flag, player, camX;
let coinsTotal, score, state; // state: "play" | "levelclear" | "win" | "dead"
let time0, timeEnd;
let particles, overlayAlpha;

// ---- Частицы ----
function spawnParticles(x, y, colors, n, power = 3) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = (0.5 + Math.random()) * power;
    particles.push({
      x, y,
      vx: Math.cos(a) * v,
      vy: Math.sin(a) * v - 1.5,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      size: 2 + Math.random() * 3,
      color: colors[(Math.random() * colors.length) | 0],
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x - camX, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function buildLevel() {
  LEVEL = LEVELS[currentLevel];
  ROWS = LEVEL.length;
  COLS = Math.max(...LEVEL.map(row => row.length));
  WORLD_W = COLS * TILE;
  WORLD_H = ROWS * TILE;

  // тема оформления уровня
  const theme = THEMES[currentLevel];
  canvas.style.background = `linear-gradient(${theme.sky[0]}, ${theme.sky[1]})`;

  solids = [];
  coins = [];
  enemies = [];
  flag = null;
  score = 0;
  camX = 0;
  state = "play";
  time0 = performance.now();
  timeEnd = null;
  particles = [];
  overlayAlpha = 0;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const ch = LEVEL[r][c];
      const x = c * TILE, y = r * TILE;
      if (ch === "#" || ch === "=") {
        solids.push({ x, y, w: TILE, h: TILE, top: ch === "=" || LEVEL[r - 1]?.[c] !== "#" });
      } else if (ch === "o") {
        coins.push({ x: x + TILE / 2, y: y + TILE / 2, taken: false });
      } else if (ch === "!") {
        enemies.push({ x, y: y + 8, w: TILE - 4, h: TILE - 8, dir: 1, speed: 1.3, x0: x, range: 2 * TILE, dead: false });
      } else if (ch === "F") {
        flag = { x: x + TILE / 2, y: y - TILE, w: 8, h: 2 * TILE };
      } else if (ch === "P") {
        player = { x, y, w: 26, h: 34, vx: 0, vy: 0, onGround: false, face: 1, squash: 0, runPhase: 0 };
      }
    }
  }
  coinsTotal = coins.length;
}

// ---- Переходы между уровнями ----
function levelTime() {
  return ((timeEnd ?? performance.now()) - time0) / 1000;
}
function restartLevel() {
  buildLevel();
}
function nextLevel() {
  runElapsed += levelTime();
  runCoins += score;
  currentLevel++;
  buildLevel();
}
function restartRun() {
  currentLevel = 0;
  runElapsed = 0;
  runCoins = 0;
  buildLevel();
}
// Реакция на действие игрока на экране между уровнями / после игры
function handleAdvance() {
  if (state === "levelclear") nextLevel();
  else if (state === "dead") restartLevel();
  else if (state === "win") restartRun();
}

// ---- Управление ----
const keys = {};
addEventListener("keydown", e => {
  keys[e.code] = true;
  if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) e.preventDefault();
  if (e.code === "KeyR") {
    if (state === "win") restartRun(); else restartLevel();
    return;
  }
  if (state !== "play" && ["Space", "Enter", "ArrowUp", "KeyW"].includes(e.code)) {
    handleAdvance();
  }
});
addEventListener("keyup", e => keys[e.code] = false);

// ---- Сенсорное управление ----
const touch = { left: false, right: false, jump: false };
const isTouchDevice = matchMedia("(pointer: coarse)").matches || "ontouchstart" in window;
if (isTouchDevice) document.body.classList.add("touch");

function bindButton(id, prop) {
  const btn = document.getElementById(id);
  const press = e => {
    e.preventDefault();
    if (state !== "play") { handleAdvance(); return; }
    touch[prop] = true;
  };
  const release = e => { e.preventDefault(); touch[prop] = false; };
  btn.addEventListener("pointerdown", press);
  btn.addEventListener("pointerup", release);
  btn.addEventListener("pointercancel", release);
  btn.addEventListener("pointerleave", release);
  btn.addEventListener("contextmenu", e => e.preventDefault());
}
bindButton("btnLeft", "left");
bindButton("btnRight", "right");
bindButton("btnJump", "jump");

// тап по экрану между уровнями / после победы или поражения
canvas.addEventListener("pointerdown", () => {
  if (state !== "play") handleAdvance();
});

const left  = () => keys["ArrowLeft"] || keys["KeyA"] || touch.left;
const right = () => keys["ArrowRight"] || keys["KeyD"] || touch.right;
const jump  = () => keys["Space"] || keys["ArrowUp"] || keys["KeyW"] || touch.jump;

// ---- Физика ----
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function updatePlayer() {
  // горизонталь
  player.vx = 0;
  if (left())  { player.vx = -MOVE_SPEED; player.face = -1; }
  if (right()) { player.vx =  MOVE_SPEED; player.face =  1; }

  // прыжок
  if (jump() && player.onGround) {
    player.vy = -JUMP_POWER;
    player.onGround = false;
    spawnParticles(player.x + player.w / 2, player.y + player.h, ["#d9c9a3", "#bfae86"], 6, 2);
  }

  // гравитация
  player.vy += GRAVITY;
  if (player.vy > 15) player.vy = 15;

  // перемещение по X со столкновениями
  player.x += player.vx;
  for (const s of solids) {
    if (rectsOverlap(player, s)) {
      if (player.vx > 0) player.x = s.x - player.w;
      else if (player.vx < 0) player.x = s.x + s.w;
    }
  }
  player.x = Math.max(0, Math.min(WORLD_W - player.w, player.x));

  // перемещение по Y со столкновениями
  const wasFalling = player.vy > 4;
  player.y += player.vy;
  player.onGround = false;
  for (const s of solids) {
    if (rectsOverlap(player, s)) {
      if (player.vy > 0) { player.y = s.y - player.h; player.vy = 0; player.onGround = true; }
      else if (player.vy < 0) { player.y = s.y + s.h; player.vy = 0; }
    }
  }
  // приседание и пыль при приземлении
  if (player.onGround && wasFalling) {
    player.squash = 1;
    spawnParticles(player.x + player.w / 2, player.y + player.h, ["#d9c9a3", "#bfae86"], 8, 2.5);
  }
  if (player.squash > 0) player.squash = Math.max(0, player.squash - 0.08);
  // фаза бега для анимации ног
  if (player.onGround && player.vx !== 0) player.runPhase += 0.28;

  // падение в пропасть
  if (player.y > WORLD_H + 100) state = "dead";

  // монеты
  for (const coin of coins) {
    if (!coin.taken &&
        Math.abs(player.x + player.w / 2 - coin.x) < 24 &&
        Math.abs(player.y + player.h / 2 - coin.y) < 24) {
      coin.taken = true;
      score++;
      spawnParticles(coin.x, coin.y, ["#ffd93b", "#fff3b0", "#ffb703"], 12, 3);
    }
  }

  // финиш
  if (flag && rectsOverlap(player, { x: flag.x - 10, y: flag.y, w: 28, h: flag.h })) {
    state = currentLevel < LEVELS.length - 1 ? "levelclear" : "win";
    spawnParticles(flag.x, flag.y + 20, ["#2ecc71", "#a3f7bf", "#ffd93b"], 24, 4);
  }
}

function updateEnemies() {
  for (const en of enemies) {
    if (en.dead) continue;
    en.x += en.dir * en.speed;
    if (en.x < en.x0 - en.range || en.x > en.x0 + en.range) en.dir *= -1;

    if (rectsOverlap(player, en)) {
      // прыжок на голову убивает врага
      if (player.vy > 0 && player.y + player.h - en.y < 18) {
        en.dead = true;
        player.vy = -8;
        spawnParticles(en.x + en.w / 2, en.y + en.h / 2, ["#c0392b", "#e74c3c", "#f1948a"], 16, 4);
      } else {
        state = "dead";
      }
    }
  }
}

// ---- Отрисовка ----
function drawBackground() {
  const theme = THEMES[currentLevel];

  // звёзды (для ночного уровня)
  if (theme.stars) {
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    for (let i = 0; i < 40; i++) {
      const sx = ((i * 137 - camX * 0.15) % (WORLD_W + 100) + WORLD_W + 100) % (WORLD_W + 100) - 50;
      const sy = 20 + (i * 53) % 260;
      const tw = 0.5 + 0.5 * Math.sin(performance.now() / 400 + i);
      ctx.globalAlpha = 0.4 + 0.6 * tw;
      ctx.fillRect(sx, sy, 2, 2);
    }
    ctx.globalAlpha = 1;
  }

  // солнце / луна с сиянием
  const sunX = 120 - camX * 0.1, sunY = 80;
  const glow = ctx.createRadialGradient(sunX, sunY, 10, sunX, sunY, 90);
  glow.addColorStop(0, `rgba(${theme.glow},0.9)`);
  glow.addColorStop(0.4, `rgba(${theme.glow},0.3)`);
  glow.addColorStop(1, `rgba(${theme.glow},0)`);
  ctx.fillStyle = glow;
  ctx.fillRect(sunX - 90, sunY - 90, 180, 180);
  ctx.fillStyle = theme.orb;
  ctx.beginPath();
  ctx.arc(sunX, sunY, 26, 0, Math.PI * 2);
  ctx.fill();
  // кратеры на луне
  if (theme.stars) {
    ctx.fillStyle = "rgba(150,160,200,0.5)";
    ctx.beginPath();
    ctx.arc(sunX - 8, sunY - 6, 5, 0, Math.PI * 2);
    ctx.arc(sunX + 9, sunY + 4, 4, 0, Math.PI * 2);
    ctx.arc(sunX + 2, sunY + 12, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // дальние горы (медленный параллакс)
  for (let i = 0; i < 10; i++) {
    const mx = ((i * 420 - camX * 0.3) % (WORLD_W + 400) + WORLD_W + 400) % (WORLD_W + 400) - 200;
    const mh = 260 + (i % 3) * 60;
    const peakY = H - mh;
    ctx.fillStyle = "rgba(90,110,160,0.35)";
    ctx.beginPath();
    ctx.moveTo(mx - 190, H);
    ctx.lineTo(mx, peakY);
    ctx.lineTo(mx + 190, H);
    ctx.fill();
    // снежная шапка — прилегает к вершине
    ctx.fillStyle = "rgba(255,255,255,0.45)";
    ctx.beginPath();
    ctx.moveTo(mx, peakY);
    ctx.lineTo(mx - 34, peakY + 48);
    ctx.lineTo(mx - 14, peakY + 38);
    ctx.lineTo(mx, peakY + 52);
    ctx.lineTo(mx + 14, peakY + 38);
    ctx.lineTo(mx + 34, peakY + 48);
    ctx.closePath();
    ctx.fill();
  }

  // облака (параллакс)
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  const drift = performance.now() / 120;
  for (let i = 0; i < 8; i++) {
    const cx = ((i * 340 - camX * 0.4 + drift) % (WORLD_W + 200) + WORLD_W + 200) % (WORLD_W + 200) - 100;
    const cy = 40 + (i % 3) * 55;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 46, 16, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + 30, cy + 6, 34, 13, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // холмы
  ctx.fillStyle = "rgba(60,130,80,0.45)";
  for (let i = 0; i < 12; i++) {
    const hx = ((i * 260 - camX * 0.7) % (WORLD_W + 300) + WORLD_W + 300) % (WORLD_W + 300) - 150;
    ctx.beginPath();
    ctx.arc(hx, H, 110 + (i % 3) * 40, Math.PI, 0);
    ctx.fill();
  }
}

// детерминированный «случайный» узор для декораций тайла
function tileHash(s) {
  return ((s.x * 73856093) ^ (s.y * 19349663)) >>> 0;
}

function drawTile(s) {
  const x = s.x - camX;
  if (x + TILE < 0 || x > W) return;
  ctx.fillStyle = "#8a5a2b";
  ctx.fillRect(x, s.y, TILE, TILE);
  // камешки в земле
  const h = tileHash(s);
  ctx.fillStyle = "rgba(0,0,0,0.12)";
  ctx.beginPath();
  ctx.arc(x + 8 + (h % 20), s.y + 22 + (h % 12), 3, 0, Math.PI * 2);
  ctx.fill();
  if (s.top) {
    ctx.fillStyle = "#4caf50";
    ctx.fillRect(x, s.y, TILE, 10);
    ctx.fillStyle = "#66bb6a";
    ctx.fillRect(x, s.y, TILE, 4);
    // мягкие пучки травы
    ctx.fillStyle = "#66bb6a";
    for (let i = 0; i < 3; i++) {
      const gx = x + 7 + i * 13 + (h >> i) % 5;
      const sway = Math.sin(performance.now() / 600 + s.x + i * 2) * 1.2;
      ctx.beginPath();
      ctx.ellipse(gx + sway, s.y - 2, 3, 5, sway * 0.2, 0, Math.PI * 2);
      ctx.fill();
    }
    // цветок на некоторых тайлах
    if (h % 5 === 0) {
      const fx = x + 10 + (h % 22);
      ctx.fillStyle = ["#ff8fa3", "#ffd166", "#c8b6ff"][h % 3];
      for (let p = 0; p < 5; p++) {
        const a = (p / 5) * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(fx + Math.cos(a) * 3.5, s.y - 10 + Math.sin(a) * 3.5, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(fx, s.y - 10, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.strokeStyle = "rgba(0,0,0,0.15)";
  ctx.strokeRect(x + 0.5, s.y + 0.5, TILE - 1, TILE - 1);
}

function drawCoin(coin) {
  if (coin.taken) return;
  const x = coin.x - camX;
  if (x < -20 || x > W + 20) return;
  const t = performance.now();
  const bounce = Math.sin(t / 250 + coin.x) * 3;
  const y = coin.y + bounce;
  // «вращение» — сжатие по горизонтали
  const spin = Math.abs(Math.cos(t / 300 + coin.x));
  ctx.fillStyle = "#ffd93b";
  ctx.beginPath();
  ctx.ellipse(x, y, 9 * Math.max(0.25, spin), 9, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = "#b8860b";
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.lineWidth = 1;
  // блик
  ctx.fillStyle = "rgba(255,255,255,0.8)";
  ctx.beginPath();
  ctx.arc(x - 3 * spin, y - 3, 2, 0, Math.PI * 2);
  ctx.fill();
  // редкие искорки вокруг монеты
  if ((t / 100 + coin.x) % 30 < 1) {
    spawnParticles(coin.x, y, ["#fff3b0"], 1, 0.6);
  }
}

function drawEnemy(en) {
  if (en.dead) return;
  const x = en.x - camX;
  if (x + en.w < 0 || x > W) return;
  const t = performance.now();
  // «дыхание» — тело пружинит при ходьбе
  const wob = Math.sin(t / 120 + en.x0) * 2;
  // ножки
  ctx.fillStyle = "#7b241c";
  const step = Math.sin(t / 90 + en.x0) * 4;
  ctx.beginPath();
  ctx.ellipse(x + 10 + step, en.y + en.h - 1, 6, 4, 0, 0, Math.PI * 2);
  ctx.ellipse(x + en.w - 10 - step, en.y + en.h - 1, 6, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#c0392b";
  ctx.beginPath();
  ctx.roundRect(x, en.y + wob / 2, en.w, en.h - wob, 8);
  ctx.fill();
  // глаза
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(x + 10, en.y + 12, 5, 0, Math.PI * 2);
  ctx.arc(x + en.w - 10, en.y + 12, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#222";
  ctx.beginPath();
  ctx.arc(x + 10 + en.dir * 2, en.y + 12, 2.5, 0, Math.PI * 2);
  ctx.arc(x + en.w - 10 + en.dir * 2, en.y + 12, 2.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawFlag() {
  const x = flag.x - camX;
  ctx.fillStyle = "#666";
  ctx.fillRect(x, flag.y, 6, flag.h);
  ctx.fillStyle = "#2ecc71";
  ctx.beginPath();
  ctx.moveTo(x + 6, flag.y + 4);
  ctx.lineTo(x + 40, flag.y + 16);
  ctx.lineTo(x + 6, flag.y + 28);
  ctx.fill();
}

function drawPlayer() {
  const cx = player.x - camX + player.w / 2;
  const bottom = player.y + player.h;

  // сжатие при приземлении / вытягивание в полёте
  let sx = 1, sy = 1;
  if (player.squash > 0) {
    sx = 1 + 0.25 * player.squash;
    sy = 1 - 0.2 * player.squash;
  } else if (!player.onGround) {
    const stretch = Math.min(0.15, Math.abs(player.vy) / 60);
    sx = 1 - stretch;
    sy = 1 + stretch;
  }
  // лёгкий наклон в сторону движения
  const tilt = player.vx * 0.02;

  ctx.save();
  ctx.translate(cx, bottom);
  ctx.rotate(tilt);
  ctx.scale(sx, sy);
  ctx.translate(-player.w / 2, -player.h);
  // ноги (шагают при беге, поджаты в прыжке)
  ctx.strokeStyle = "#27408b";
  ctx.lineWidth = 5;
  ctx.lineCap = "round";
  let legL = 0, legR = 0;
  if (player.onGround && player.vx !== 0) {
    legL = Math.sin(player.runPhase) * 6;
    legR = -legL;
  } else if (!player.onGround) {
    legL = -4; legR = 4;
  }
  ctx.beginPath();
  ctx.moveTo(player.w / 2 - 5, player.h - 10);
  ctx.lineTo(player.w / 2 - 5 + legL, player.h - 1);
  ctx.moveTo(player.w / 2 + 5, player.h - 10);
  ctx.lineTo(player.w / 2 + 5 + legR, player.h - 1);
  ctx.stroke();
  ctx.lineWidth = 1;
  // тело
  ctx.fillStyle = "#3867d6";
  ctx.beginPath();
  ctx.roundRect(0, 10, player.w, player.h - 16, 6);
  ctx.fill();
  // голова с лёгким покачиванием при беге
  const bob = player.onGround && player.vx !== 0 ? Math.sin(player.runPhase * 2) * 1.2 : 0;
  ctx.fillStyle = "#ffce9e";
  ctx.beginPath();
  ctx.arc(player.w / 2, 9 + bob, 10, 0, Math.PI * 2);
  ctx.fill();
  // глаза
  ctx.fillStyle = "#222";
  ctx.beginPath();
  ctx.arc(player.w / 2 + player.face * 4, 8 + bob, 2, 0, Math.PI * 2);
  ctx.fill();
  // кепка
  ctx.fillStyle = "#e74c3c";
  ctx.beginPath();
  ctx.arc(player.w / 2, 6 + bob, 10, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(player.w / 2, 4 + bob, 14 * player.face, 3);
  ctx.restore();
}

function drawHUD() {
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.beginPath();
  ctx.roundRect(12, 12, 320, 34, 8);
  ctx.fill();
  ctx.fillStyle = "#ffd93b";
  ctx.font = "bold 18px 'Segoe UI', Arial";
  const t = levelTime().toFixed(1);
  ctx.fillText(`🏁 Ур. ${currentLevel + 1}/${LEVELS.length}   🪙 ${score}/${coinsTotal}   ⏱ ${t}с`, 24, 36);
}

function drawOverlay(title, subtitle, color) {
  // плавное затемнение и выезд текста
  overlayAlpha = Math.min(1, overlayAlpha + 0.04);
  const k = overlayAlpha;
  ctx.fillStyle = `rgba(0,0,0,${0.55 * k})`;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = k;
  const rise = (1 - k) * 30;
  ctx.textAlign = "center";
  ctx.fillStyle = color;
  ctx.font = "bold 52px 'Segoe UI', Arial";
  ctx.fillText(title, W / 2, H / 2 - 20 + rise);
  ctx.fillStyle = "#fff";
  ctx.font = "22px 'Segoe UI', Arial";
  ctx.fillText(subtitle, W / 2, H / 2 + 28 + rise);
  ctx.textAlign = "left";
  ctx.globalAlpha = 1;
}

// ---- Главный цикл ----
function loop() {
  if (state === "play") {
    updatePlayer();
    updateEnemies();
    // камера плавно следует за игроком
    const camTarget = Math.max(0, Math.min(WORLD_W - W, player.x + player.w / 2 - W / 2));
    camX += (camTarget - camX) * 0.12;
    if (state !== "play") timeEnd = performance.now();
  }
  updateParticles();

  ctx.clearRect(0, 0, W, H);
  drawBackground();
  for (const s of solids) drawTile(s);
  for (const coin of coins) drawCoin(coin);
  for (const en of enemies) drawEnemy(en);
  drawFlag();
  drawPlayer();
  drawParticles();
  drawHUD();

  if (state === "levelclear") {
    const go = isTouchDevice ? "коснись экрана — дальше" : "Пробел / Enter — дальше";
    drawOverlay(`Уровень ${currentLevel + 1} пройден! ✨`,
      `Монеты: ${score}/${coinsTotal} • Время: ${levelTime().toFixed(1)}с • ${go}`, "#2ecc71");
  } else if (state === "win") {
    const total = (runElapsed + levelTime()).toFixed(1);
    const allCoins = runCoins + score;
    const again = isTouchDevice ? "коснись экрана — сначала" : "R — играть сначала";
    const perfect = allCoins === TOTAL_COINS ? " — ВСЕ МОНЕТЫ! ✨" : "";
    drawOverlay("ВСЕ УРОВНИ ПРОЙДЕНЫ! 🎉",
      `🪙 Монеты: ${allCoins}/${TOTAL_COINS}${perfect} • ⏱ Время: ${total}с • ${again}`, "#ffd93b");
  } else if (state === "dead") {
    const again = isTouchDevice ? "Коснись экрана, чтобы повторить уровень" : "Нажми R, чтобы повторить уровень";
    drawOverlay("ИГРА ОКОНЧЕНА", again, "#e74c3c");
  }

  requestAnimationFrame(loop);
}

buildLevel();
loop();
</script>
